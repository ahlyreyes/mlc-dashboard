<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/mlc-logo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logistics — MLC Insights</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #EEF2FF; min-height: 100vh; padding: 24px 20px; }

.app-header {
  background: linear-gradient(90deg, #1D4ED8 0%, #2563EB 60%, #3B82F6 100%);
  color: #fff; padding: 0 22px; height: 54px; display: flex; align-items: center;
  justify-content: space-between; border-radius: 16px; margin-bottom: 22px;
  box-shadow: 0 4px 20px rgba(37,99,235,0.25);
}
.header-logo { font-size: 1.05rem; font-weight: 800; letter-spacing: -0.5px; }
.header-logo span { opacity: 0.65; font-weight: 500; font-size: 0.8rem; margin-left: 8px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.header-user { font-size: 0.75rem; opacity: 0.8; font-weight: 500; }
.back-link { font-size: 0.75rem; font-weight: 600; color: #fff; text-decoration: none; opacity: 0.85;
  padding: 5px 12px; border: 1px solid rgba(255,255,255,0.35); border-radius: 8px; transition: all 0.15s; }
.back-link:hover { opacity: 1; background: rgba(255,255,255,0.15); }

.page-title { font-size: 1.3rem; font-weight: 800; color: #0F172A; margin-bottom: 4px; letter-spacing: -0.5px; }
.page-sub { font-size: 0.78rem; color: #64748B; margin-bottom: 20px; }

.toolbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
  background: #fff; border: 1px solid #E2E8F0; border-radius: 14px; padding: 12px 16px; margin-bottom: 16px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.04); }
.range-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.range-pick-label { font-size: 0.72rem; font-weight: 700; color: #64748B; text-transform: uppercase; letter-spacing: 0.5px; }
.date-input { padding: 7px 12px; border-radius: 10px; border: 1.5px solid #DBEAFE; background: #fff;
  font-size: 0.78rem; font-weight: 600; color: #1E40AF; font-family: 'Inter', sans-serif; outline: none; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
.date-input:focus { border-color: #2563EB; }
.btn { padding: 7px 18px; border-radius: 20px; border: none; background: linear-gradient(135deg, #2563EB, #3B82F6);
  color: #fff; font-size: 0.78rem; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; box-shadow: 0 3px 12px rgba(37,99,235,0.30); }
.range-label { font-size: 0.72rem; font-weight: 500; color: #94A3B8; margin: 0; }

.metric-group { margin-bottom: 22px; }
.group-label { font-size: 0.68rem; font-weight: 800; color: #94A3B8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; padding-left: 2px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.grid-auto { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 14px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; max-width: 60%; }
@media (max-width: 820px) { .grid-4 { grid-template-columns: 1fr 1fr; } .grid-2 { max-width: 100%; } }
@media (max-width: 680px) { .grid-3 { grid-template-columns: 1fr 1fr; } }
@media (max-width: 460px) { .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; } }

.card { background: #fff; border: 1px solid #E2E8F0; border-radius: 16px; padding: 18px 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05); transition: box-shadow 0.2s, transform 0.2s; }
.card:hover { box-shadow: 0 6px 24px rgba(37,99,235,0.10); transform: translateY(-2px); }
.card.hl { border-left: 4px solid #2563EB; background: linear-gradient(135deg, #ffffff 0%, #F0F7FF 100%); }
.card.good { border-left: 4px solid #16a34a; }
.card.bad  { border-left: 4px solid #dc2626; }
.k-label { font-size: 0.65rem; font-weight: 700; color: #94A3B8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.k-value { font-size: 1.8rem; font-weight: 800; color: #0F172A; line-height: 1.1; margin-bottom: 4px; letter-spacing: -0.5px; }
.k-sub { font-size: 0.7rem; color: #94A3B8; }
.v-good { color: #16a34a; } .v-ok { color: #D97706; } .v-bad { color: #dc2626; }

.tbl-card { background: #fff; border: 1px solid #E2E8F0; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); margin-bottom: 18px; overflow-x: auto; }
.tbl-title { font-size: 0.72rem; font-weight: 800; color: #64748B; text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 14px; }
table { width: 100%; border-collapse: collapse; font-size: 0.82rem; min-width: 620px; }
th { text-align: right; padding: 9px 12px; font-size: 0.62rem; font-weight: 700; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.6px; border-bottom: 2px solid #E2E8F0; }
th:first-child, td:first-child { text-align: left; }
td { padding: 11px 12px; text-align: right; border-bottom: 1px solid #F1F5F9; color: #0F172A; font-weight: 600; }
tr:last-child td { border-bottom: none; }
.name-cell { font-weight: 700; }
.total-row td { border-top: 2px solid #E2E8F0; font-weight: 800; background: #F8FAFF; }
.bar-wrap { display: inline-block; width: 54px; height: 6px; background: #E2E8F0; border-radius: 3px; overflow: hidden; vertical-align: middle; margin-left: 6px; }
.bar-fill { height: 100%; border-radius: 3px; }
.state-msg { text-align: center; padding: 48px; color: #94A3B8; font-size: 0.85rem; }
.error-msg { color: #EF4444; }

/* Date-basis toggle */
.basis-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 18px; }
.basis-tabs { display: inline-flex; background: #E2E8F0; border-radius: 11px; padding: 4px; gap: 2px; }
.basis-tab { padding: 7px 16px; border-radius: 8px; border: none; background: transparent; font-size: 0.76rem;
  font-weight: 600; color: #64748B; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s; }
.basis-tab:hover { color: #1E40AF; }
.basis-tab.active { background: #fff; color: #1D4ED8; box-shadow: 0 1px 6px rgba(15,23,42,0.10); }
.basis-note { font-size: 0.7rem; color: #94A3B8; }
</style>
</head>
<body>

<div class="app-header">
  <div class="header-logo">MLC<span>Logistics</span></div>
  <div class="header-right">
    <span class="header-user" id="headerUser"></span>
    <a href="/home" class="back-link">← Home</a>
  </div>
</div>

<div class="page-title">Logistics</div>
<div class="page-sub">Delivery &amp; return (RTS) performance — protect revenue from failed deliveries</div>

<div class="toolbar">
  <div class="range-bar">
    <span class="range-pick-label">From</span>
    <input type="date" id="fromDate" class="date-input">
    <span class="range-pick-label">To</span>
    <input type="date" id="toDate" class="date-input">
    <button class="btn" id="applyBtn">Apply</button>
  </div>
  <div class="range-label" id="rangeLabel"></div>
</div>

<div class="basis-row">
  <span class="range-pick-label">Date basis</span>
  <div class="basis-tabs">
    <button class="basis-tab active" data-basis="order" onclick="setBasis('order')">Order Date</button>
    <button class="basis-tab" data-basis="delivery" onclick="setBasis('delivery')">Delivery Date</button>
  </div>
  <span class="basis-note" id="basisNote"></span>
</div>

<div id="content"><div class="state-msg">Loading...</div></div>

<script>
const PHP = n => '₱' + Number(n||0).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const NUM = n => Number(n||0).toLocaleString('en-PH');
const PCT = n => (n==null ? '—' : Number(n).toFixed(1) + '%');

// Business "today" — rolls over at 5 AM PHT
function bizToday() { return new Date(Date.now() + 3*60*60*1000).toISOString().split('T')[0]; }
function monthStart() { const d = new Date(Date.now() + 3*60*60*1000); d.setUTCDate(1); return d.toISOString().split('T')[0]; }

// Delivery rate: green ≥90, orange ≥75, else red
function delClass(r) { if (r==null) return ''; if (r>=90) return 'v-good'; if (r>=75) return 'v-ok'; return 'v-bad'; }
// RTS rate: green <10, orange <20, else red (high = bad)
function rtsClass(r) { if (r==null) return ''; if (r<10) return 'v-good'; if (r<20) return 'v-ok'; return 'v-bad'; }

function setRangeLabel(f, t) {
  const fmt = ds => new Date(ds+'T00:00:00').toLocaleDateString('en-PH', { month:'short', day:'numeric', year:'numeric' });
  const range = f===t ? fmt(t) : `${fmt(f)} — ${fmt(t)}`;
  const now = new Date().toLocaleString('en-PH', { timeZone:'Asia/Manila', month:'short', day:'numeric', hour:'numeric', minute:'2-digit', hour12:true });
  document.getElementById('rangeLabel').innerHTML = `Showing: ${range} &nbsp;·&nbsp; Updated: ${now} (PHT)`;
}

function bar(pct, color) {
  const w = Math.max(0, Math.min(100, pct||0));
  return `<span class="bar-wrap"><span class="bar-fill" style="width:${w}%;background:${color}"></span></span>`;
}

function breakdownTable(title, rows) {
  let body = rows.map(r => `<tr>
    <td class="name-cell">${r.name}</td>
    <td>${NUM(r.delivered)}</td>
    <td>${NUM(r.returned)}</td>
    <td class="${delClass(r.deliveryRate)}">${PCT(r.deliveryRate)}${r.deliveryRate!=null?bar(r.deliveryRate,'#16a34a'):''}</td>
    <td class="${rtsClass(r.rtsRate)}">${PCT(r.rtsRate)}${r.rtsRate!=null?bar(r.rtsRate,'#dc2626'):''}</td>
    <td>${PHP(r.deliveredValue)}</td>
    <td class="v-bad">${PHP(r.returnedValue)}</td>
  </tr>`).join('');
  return `<div class="tbl-card">
    <div class="tbl-title">${title}</div>
    <table>
      <thead><tr>
        <th>${title.includes('Product')?'Product':'Region'}</th>
        <th>Delivered</th><th>RTS</th><th>Delivery Rate</th><th>RTS Rate</th>
        <th>Net Revenue</th><th>Lost to RTS</th>
      </tr></thead>
      <tbody>${body || '<tr><td colspan="7" style="text-align:center;color:#94A3B8">No data</td></tr>'}</tbody>
    </table>
  </div>`;
}

let currentBasis = 'order';
const BASIS_NOTE = {
  order:    'Orders placed in this range + how they turned out (best for RTS rate over a full period).',
  delivery: 'Units actually delivered per Delivery Date (real daily throughput). RTS still by order date — no RTS date in the source sheet.'
};

function setBasis(b) {
  currentBasis = b;
  document.querySelectorAll('.basis-tab').forEach(el => el.classList.toggle('active', el.dataset.basis === b));
  load();
}

async function load() {
  const from = document.getElementById('fromDate').value;
  const to   = document.getElementById('toDate').value;
  if (!from || !to) return;
  if (from > to) { document.getElementById('toDate').value = from; return; }
  document.getElementById('content').innerHTML = '<div class="state-msg">Loading...</div>';
  document.getElementById('basisNote').textContent = BASIS_NOTE[currentBasis];
  setRangeLabel(from, to);
  try {
    const res = await fetch(`/api/logistics?from=${from}&to=${to}&basis=${currentBasis}`);
    if (!res.ok) throw new Error('Server error');
    const d = await res.json();
    if (d.error) throw new Error(d.error);
    if (currentBasis === 'delivery') renderDeliveryView(d);
    else renderOrderView(d);
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="state-msg error-msg">Failed to load: ${e.message}</div>`;
  }
}

// ORDER DATE mode — full cohort analysis (delivered / RTS / in-transit over total)
function renderOrderView(d) {
  const t = d.totals;
  const totalOrders = t.delivered + t.returned + t.shipped; // fulfillable; cancelled shown separately
  const pctTot = a => totalOrders > 0 ? (a / totalOrders * 100).toFixed(1) + '%' : '—';
  document.getElementById('content').innerHTML = `
    <div class="metric-group">
      <div class="group-label">Order Outcomes — over total orders</div>
      <div class="grid-auto">
        <div class="card hl"><div class="k-label">Total Orders</div><div class="k-value">${NUM(totalOrders)}</div><div class="k-sub">Delivered + RTS + in-transit</div></div>
        <div class="card good"><div class="k-label">Delivered</div><div class="k-value v-good">${NUM(t.delivered)}</div><div class="k-sub"><b>${pctTot(t.delivered)}</b> of total orders</div></div>
        <div class="card bad"><div class="k-label">RTS (Returned)</div><div class="k-value v-bad">${NUM(t.returned)}</div><div class="k-sub"><b>${pctTot(t.returned)}</b> of total orders</div></div>
        <div class="card"><div class="k-label">In Transit</div><div class="k-value">${NUM(t.shipped)}</div><div class="k-sub"><b>${pctTot(t.shipped)}</b> still on the way</div></div>
        <div class="card"><div class="k-label">Cancelled</div><div class="k-value">${NUM(t.cancelled)}</div><div class="k-sub">Not counted in total</div></div>
      </div>
    </div>

    <div class="metric-group">
      <div class="group-label">Delivery Quality — of completed orders (excludes in-transit)</div>
      <div class="grid-2">
        <div class="card hl"><div class="k-label">Delivery Rate</div><div class="k-value ${delClass(t.deliveryRate)}">${PCT(t.deliveryRate)}</div><div class="k-sub">Delivered ÷ (Delivered + RTS)</div></div>
        <div class="card"><div class="k-label">RTS Rate</div><div class="k-value ${rtsClass(t.rtsRate)}">${PCT(t.rtsRate)}</div><div class="k-sub">Returned ÷ (Delivered + RTS)</div></div>
      </div>
    </div>

    <div class="metric-group">
      <div class="group-label">Revenue Impact</div>
      <div class="grid-3">
        <div class="card hl"><div class="k-label">Gross Revenue</div><div class="k-value">${PHP(t.grossValue)}</div><div class="k-sub">Delivered + RTS + in-transit</div></div>
        <div class="card good"><div class="k-label">Delivered (Net)</div><div class="k-value v-good">${PHP(t.deliveredValue)}</div><div class="k-sub">Actual realized revenue</div></div>
        <div class="card bad"><div class="k-label">Lost to RTS</div><div class="k-value v-bad">${PHP(t.returnedValue)}</div><div class="k-sub">Revenue lost to returns</div></div>
      </div>
    </div>

    ${breakdownTable('RTS &amp; Delivery by Product', d.byProduct)}
    ${breakdownTable('RTS &amp; Delivery by Region', d.byRegion)}
  `;
}

// DELIVERY DATE mode — delivered throughput only (RTS has no date in the sheet)
function deliveredTable(title, rows, totalDel) {
  const label = title.includes('Product') ? 'Product' : 'Region';
  const body = rows.filter(r => r.delivered > 0).sort((a,b) => b.delivered - a.delivered).map(r => `<tr>
    <td class="name-cell">${r.name}</td>
    <td>${NUM(r.delivered)}</td>
    <td>${totalDel > 0 ? (r.delivered / totalDel * 100).toFixed(1) + '%' : '—'}</td>
    <td>${PHP(r.deliveredValue)}</td>
  </tr>`).join('');
  return `<div class="tbl-card"><div class="tbl-title">${title}</div>
    <table><thead><tr><th>${label}</th><th>Delivered</th><th>Share</th><th>Realized Revenue</th></tr></thead>
    <tbody>${body || '<tr><td colspan="4" style="text-align:center;color:#94A3B8">No data</td></tr>'}</tbody></table></div>`;
}

function renderDeliveryView(d) {
  const t = d.totals;
  document.getElementById('content').innerHTML = `
    <div class="metric-group">
      <div class="group-label">Delivery Activity — units delivered in this range</div>
      <div class="grid-3">
        <div class="card good"><div class="k-label">Delivered</div><div class="k-value v-good">${NUM(t.delivered)}</div><div class="k-sub">Units actually delivered</div></div>
        <div class="card hl"><div class="k-label">Realized Revenue</div><div class="k-value">${PHP(t.deliveredValue)}</div><div class="k-sub">From delivered units</div></div>
        <div class="card"><div class="k-label">Avg / Order</div><div class="k-value">${t.delivered > 0 ? PHP(t.deliveredValue / t.delivered) : '—'}</div><div class="k-sub">Delivered AOV</div></div>
      </div>
    </div>
    <div style="font-size:0.72rem;color:#94A3B8;margin:-6px 0 16px;line-height:1.5">
      Ipinapakita ang mga <b>na-deliver</b> ayon sa aktwal na Delivery Date. Hindi kasama ang RTS/returns dito —
      walang RTS date sa source sheet. Para sa return analysis, gamitin ang <b>Order Date</b>.
    </div>
    ${deliveredTable('Delivered by Product', d.byProduct, t.delivered)}
    ${deliveredTable('Delivered by Region', d.byRegion, t.delivered)}
  `;
}

// Default: month-to-date
document.getElementById('fromDate').value = monthStart();
document.getElementById('toDate').value   = bizToday();
document.getElementById('applyBtn').addEventListener('click', load);
document.getElementById('fromDate').addEventListener('change', load);
document.getElementById('toDate').addEventListener('change', load);

fetch('/api/me').then(r => r.json()).then(u => {
  document.getElementById('headerUser').textContent = u.name || u.email || '';
}).catch(() => {});

load();
</script>
</body>
</html>
