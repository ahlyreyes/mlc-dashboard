<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLC Insights</title>
<meta property="og:title" content="MLC Insights — Analytics">
<meta property="og:site_name" content="MLC Insights">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #EEF2FF;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 16px;
  position: relative;
  overflow: hidden;
}
.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(70px);
  opacity: 0.3;
  pointer-events: none;
}
.blob-1 { width: 500px; height: 500px; background: #6366F1; top: -160px; left: -150px; }
.blob-2 { width: 350px; height: 350px; background: #3B82F6; bottom: -100px; right: -100px; }

.page-card {
  background: #fff;
  border-radius: 24px;
  box-shadow: 0 8px 48px rgba(37,99,235,0.10);
  padding: 44px 40px;
  width: 100%;
  max-width: 680px;
  position: relative;
  z-index: 1;
}

.brand-top {
  text-align: center;
  margin-bottom: 36px;
}
.logo-text {
  font-size: 2.2rem;
  font-weight: 800;
  color: #1E40AF;
  letter-spacing: -1px;
}
.logo-text span { color: #6366F1; }
.logo-tag {
  font-size: 0.68rem;
  font-weight: 600;
  color: #93C5FD;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-top: 2px;
}
.brand-subtitle {
  font-size: 0.82rem;
  color: #6B7280;
  font-weight: 500;
  margin-top: 8px;
}

.section-label {
  font-size: 0.68rem;
  font-weight: 700;
  color: #93C5FD;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  margin-bottom: 14px;
}

.report-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
@media (max-width: 540px) {
  .report-grid { grid-template-columns: 1fr; }
  .page-card { padding: 32px 20px; }
}

.report-card {
  background: #fff;
  border: 1.5px solid #E5E7EB;
  border-radius: 14px;
  padding: 18px 16px;
  cursor: pointer;
  text-decoration: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition: all 0.18s;
  border-left: 4px solid #E5E7EB;
  position: relative;
}
.report-card:hover {
  border-color: #2563EB;
  border-left-color: #2563EB;
  box-shadow: 0 4px 20px rgba(37,99,235,0.12);
  transform: translateY(-2px);
}
.report-card.disabled {
  opacity: 0.45;
  cursor: not-allowed;
  pointer-events: none;
}

.report-card-name {
  font-size: 0.88rem;
  font-weight: 600;
  color: #1E3A8A;
}
.report-card-desc {
  font-size: 0.74rem;
  color: #6B7280;
  line-height: 1.5;
}
.coming-soon-badge {
  position: absolute;
  top: 10px; right: 10px;
  background: #F3F4F6;
  color: #9CA3AF;
  border-radius: 20px;
  padding: 2px 8px;
  font-size: 0.62rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.card-ndap    { border-left-color: #2563EB; }
.card-roas    { border-left-color: #6366F1; }
.card-income  { border-left-color: #10B981; }
.card-aovcvr  { border-left-color: #F59E0B; }
.card-sales   { border-left-color: #EC4899; }

.card-ndap:hover    { border-color: #2563EB; box-shadow: 0 4px 20px rgba(37,99,235,0.14); }
.card-roas:hover    { border-color: #6366F1; box-shadow: 0 4px 20px rgba(99,102,241,0.12); }
.card-income:hover  { border-color: #10B981; box-shadow: 0 4px 20px rgba(16,185,129,0.12); }
.card-aovcvr:hover  { border-color: #F59E0B; box-shadow: 0 4px 20px rgba(245,158,11,0.12); }
.card-sales:hover   { border-color: #EC4899; box-shadow: 0 4px 20px rgba(236,72,153,0.12); }

.divider { border: none; border-top: 1px solid #F3F4F6; margin: 28px 0; }

.footer-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}
.user-info { font-size: 0.72rem; color: #9CA3AF; }
.user-info strong { color: #6B7280; }
.logout-link {
  font-size: 0.72rem;
  color: #6B7280;
  text-decoration: none;
  padding: 5px 12px;
  border: 1px solid #DBEAFE;
  border-radius: 8px;
  transition: all 0.15s;
  font-weight: 500;
}
.logout-link:hover { border-color: #2563EB; color: #1E40AF; background: #EFF6FF; }
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="page-card">
  <div class="brand-top">
    <div class="logo-text">MLC<span>.</span></div>
    <div class="logo-tag">Insights Platform</div>
    <div class="brand-subtitle">Clear Sight Analytics Dashboard</div>
  </div>

  <div class="section-label">Select a Report</div>

  <div class="report-grid" style="grid-template-columns: 1fr;">

    <a href="/" class="report-card card-ndap">
      <div class="report-card-name">Clear Sight</div>
      <div class="report-card-desc">Next Day Advertising Plan — daily ad performance and action decisions</div>
    </a>

  </div>

  <hr class="divider">

  <div class="footer-row">
    <div class="user-info">Logged in as <strong id="userLabel">—</strong></div>
    <a href="/logout" class="logout-link">Logout</a>
  </div>
</div>

<script>
fetch('/api/me').then(r => r.json()).then(u => {
  document.getElementById('userLabel').textContent = u.name || u.email || '—';
}).catch(() => {});
</script>
</body>
</html>
