<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLC Insights — Login</title>
<meta property="og:title" content="MLC Insights — NDAP">
<meta property="og:site_name" content="MLC Insights">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: #EEF2FF;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
/* Decorative blobs */
.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  opacity: 0.35;
  pointer-events: none;
}
.blob-1 { width: 400px; height: 400px; background: #6366F1; top: -120px; left: -100px; }
.blob-2 { width: 300px; height: 300px; background: #3B82F6; bottom: -80px; right: -80px; }

.card {
  background: #fff;
  border-radius: 24px;
  box-shadow: 0 8px 48px rgba(37,99,235,0.10);
  padding: 52px 44px;
  text-align: center;
  max-width: 400px;
  width: 100%;
  position: relative;
  z-index: 1;
}
.logo-wrap { margin-bottom: 28px; }
.logo-text {
  font-size: 2rem;
  font-weight: 800;
  color: #1E40AF;
  letter-spacing: -1px;
}
.logo-text span { color: #6366F1; }
.logo-tag {
  font-size: 0.7rem;
  font-weight: 600;
  color: #93C5FD;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 2px;
}
h1 { font-size: 1.25rem; font-weight: 700; color: #1E3A8A; margin-bottom: 6px; }
.subtitle { font-size: 0.82rem; color: #6B7280; margin-bottom: 36px; font-weight: 500; }
.google-btn {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  background: #fff;
  border: 1.5px solid #DBEAFE;
  border-radius: 12px;
  padding: 14px 24px;
  font-size: 0.9rem;
  font-weight: 600;
  color: #1E40AF;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s;
  width: 100%;
  font-family: 'Inter', sans-serif;
}
.google-btn:hover {
  border-color: #2563EB;
  background: #EFF6FF;
  box-shadow: 0 4px 16px rgba(37,99,235,0.15);
  transform: translateY(-1px);
}
.google-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
.error {
  background: #FEF2F2; color: #DC2626;
  border-radius: 8px; padding: 10px 16px;
  font-size: 0.82rem; margin-bottom: 20px; display: none;
  font-weight: 500;
}
.error.show { display: block; }
.footer { margin-top: 28px; font-size: 0.7rem; color: #9CA3AF; }
.divider { border: none; border-top: 1px solid #F3F4F6; margin: 28px 0; }
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-text">MLC<span>.</span></div>
    <div class="logo-tag">Insights Platform</div>
  </div>
  <h1>Welcome back</h1>
  <div class="subtitle">Sign in to access your analytics dashboard</div>
  <div class="error" id="errorMsg"></div>
  <a href="/auth/google" class="google-btn">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Sign in with Google
  </a>
  <hr class="divider">
  <div class="footer">Authorized access only. Contact your administrator for access.</div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  if (params.get('error') === 'unauthorized') {
    const el = document.getElementById('errorMsg');
    el.textContent = 'Your Google account is not authorized. Contact your administrator.';
    el.classList.add('show');
  }
  if (params.get('error') === 'oauth_error') {
    const el = document.getElementById('errorMsg');
    el.textContent = 'Authentication error. Please try again or contact your administrator.';
    el.classList.add('show');
  }
</script>
</body>
</html>
