<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller's Hub FSD — Login</title>
<meta property="og:title" content="Seller's Hub FSD — NDAP">
<meta property="og:site_name" content="Seller's Hub FSD">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: #F4F6FA;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card {
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.08);
  padding: 52px 44px;
  text-align: center;
  max-width: 400px;
  width: 100%;
}
.logo-wrap { margin-bottom: 28px; }
.logo-wrap img { width: 200px; height: auto; }
h1 { font-size: 1.4rem; font-weight: 800; color: #1F2937; margin-bottom: 6px; }
h1 span { color: #ffb800; }
.subtitle { font-size: 0.82rem; color: #6B7280; margin-bottom: 36px; font-weight: 500; }
.google-btn {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  background: #fff;
  border: 1.5px solid #E5E7EB;
  border-radius: 10px;
  padding: 14px 24px;
  font-size: 0.9rem;
  font-weight: 600;
  color: #1F2937;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s;
  width: 100%;
  font-family: 'Inter', sans-serif;
}
.google-btn:hover { border-color: #ffb800; background: #FFFBEB; box-shadow: 0 2px 12px rgba(244,196,48,0.15); }
.google-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
.error {
  background: #FEF2F2; color: #DC2626;
  border-radius: 8px; padding: 10px 16px;
  font-size: 0.82rem; margin-bottom: 20px; display: none;
  font-weight: 500;
}
.error.show { display: block; }
.footer { margin-top: 28px; font-size: 0.7rem; color: #9CA3AF; }
.divider { border: none; border-top: 1px solid #F3F4F6; margin: 28px 0; }
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <img src="/logo.svg" alt="Seller's Hub">
  </div>
  <div class="error" id="errorMsg"></div>
  <a href="/auth/google" class="google-btn">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Sign in with Google
  </a>
  <hr class="divider">
  <div class="footer">Authorized access only. Contact your administrator for access.</div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  if (params.get('error') === 'unauthorized') {
    const el = document.getElementById('errorMsg');
    el.textContent = 'Your Google account is not authorized. Contact your administrator.';
    el.classList.add('show');
  }
</script>
</body>
</html>
