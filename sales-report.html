<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Report — Seller's Hub FSD</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: #F4F6FA; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px 16px; }
.card { background: #fff; border-radius: 20px; box-shadow: 0 8px 40px rgba(0,0,0,0.08); padding: 52px 44px; text-align: center; max-width: 480px; width: 100%; }
.accent-bar { width: 40px; height: 4px; background: #EC4899; border-radius: 4px; margin: 0 auto 24px; }
h1 { font-size: 1.3rem; font-weight: 700; color: #1F2937; margin-bottom: 10px; }
p { font-size: 0.85rem; color: #6B7280; line-height: 1.6; margin-bottom: 28px; }
.badge { display: inline-block; background: #FDF2F8; color: #EC4899; border-radius: 20px; padding: 4px 14px; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.4px; margin-bottom: 28px; }
.back-btn { display: inline-flex; align-items: center; gap: 6px; background: #ffb800; color: #fff; border: none; border-radius: 10px; padding: 10px 22px; font-size: 0.85rem; font-weight: 600; font-family: inherit; cursor: pointer; text-decoration: none; transition: background 0.15s; }
.back-btn:hover { background: #cc9400; }
</style>
</head>
<body>
<div class="card">
  <div class="accent-bar"></div>
  <div class="badge">Under Construction</div>
  <h1>Sales Report</h1>
  <p>Overall sales performance and order data.<br>This report is coming soon.</p>
  <a href="/home" class="back-btn">← Back to Reports</a>
</div>
</body>
</html>
