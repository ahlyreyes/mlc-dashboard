<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Summary — MLC Insights</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #EEF2FF;
  min-height: 100vh;
  padding: 24px 20px;
}

.app-header {
  background: linear-gradient(90deg, #1D4ED8 0%, #2563EB 60%, #3B82F6 100%);
  color: #fff;
  padding: 0 22px;
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-radius: 16px;
  margin-bottom: 22px;
  box-shadow: 0 4px 20px rgba(37,99,235,0.25);
}
.header-logo { font-size: 1.05rem; font-weight: 800; letter-spacing: -0.5px; }
.header-logo span { opacity: 0.65; font-weight: 500; font-size: 0.8rem; margin-left: 8px; letter-spacing: 0; }
.header-right { display: flex; align-items: center; gap: 12px; }
.header-user { font-size: 0.75rem; opacity: 0.8; font-weight: 500; }
.back-link {
  font-size: 0.75rem;
  font-weight: 600;
  color: #fff;
  text-decoration: none;
  opacity: 0.85;
  padding: 5px 12px;
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 8px;
  transition: all 0.15s;
}
.back-link:hover { opacity: 1; background: rgba(255,255,255,0.15); }

.page-title {
  font-size: 1.3rem;
  font-weight: 800;
  color: #0F172A;
  margin-bottom: 4px;
  letter-spacing: -0.5px;
}
.page-sub {
  font-size: 0.78rem;
  color: #64748B;
  margin-bottom: 20px;
  font-weight: 400;
}

/* Time range selector */
.range-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.range-btn {
  padding: 7px 18px;
  border-radius: 20px;
  border: 1.5px solid #DBEAFE;
  background: #fff;
  font-size: 0.78rem;
  font-weight: 600;
  color: #3B82F6;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.range-btn:hover { border-color: #2563EB; color: #1E40AF; background: #EFF6FF; }
.range-btn.active {
  background: linear-gradient(135deg, #2563EB, #3B82F6);
  border-color: #2563EB;
  color: #fff;
  box-shadow: 0 3px 12px rgba(37,99,235,0.30);
}
.range-bar { align-items: center; }
.range-pick-label {
  font-size: 0.72rem;
  font-weight: 700;
  color: #64748B;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.date-input {
  padding: 7px 12px;
  border-radius: 10px;
  border: 1.5px solid #DBEAFE;
  background: #fff;
  font-size: 0.78rem;
  font-weight: 600;
  color: #1E40AF;
  font-family: 'Inter', sans-serif;
  outline: none;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.date-input:focus { border-color: #2563EB; }

/* KPI grid */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 24px;
}
@media (max-width: 680px) { .kpi-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 420px) { .kpi-grid { grid-template-columns: 1fr; } }

.kpi-card {
  background: #fff;
  border: 1px solid #E2E8F0;
  border-radius: 16px;
  padding: 20px 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  transition: box-shadow 0.2s, transform 0.2s;
}
.kpi-card:hover { box-shadow: 0 6px 24px rgba(37,99,235,0.10); transform: translateY(-2px); }
.kpi-label {
  font-size: 0.65rem;
  font-weight: 700;
  color: #94A3B8;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.kpi-value {
  font-size: 1.85rem;
  font-weight: 800;
  color: #0F172A;
  line-height: 1.1;
  margin-bottom: 5px;
  letter-spacing: -0.5px;
}
.kpi-sub {
  font-size: 0.7rem;
  color: #94A3B8;
  font-weight: 400;
}
.kpi-card.highlight {
  border-left: 4px solid #2563EB;
  background: linear-gradient(135deg, #ffffff 0%, #F0F7FF 100%);
}

/* Loading / error */
.state-msg {
  text-align: center;
  padding: 48px;
  color: #94A3B8;
  font-size: 0.85rem;
}
.error-msg { color: #EF4444; }

/* Date range label */
.range-label {
  font-size: 0.72rem;
  font-weight: 500;
  color: #94A3B8;
  margin-bottom: 16px;
}

/* Product filter pills */
.filter-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
.pill {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1.5px solid #DBEAFE;
  background: #fff;
  font-size: 0.78rem;
  font-weight: 600;
  color: #3B82F6;
  cursor: pointer;
  transition: all 0.15s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  font-family: 'Inter', sans-serif;
}
.pill:hover { background: #EFF6FF; border-color: #2563EB; }
.pill.active {
  background: linear-gradient(135deg, #2563EB, #3B82F6);
  border-color: #2563EB;
  color: #fff;
  box-shadow: 0 3px 12px rgba(37,99,235,0.30);
}

/* Section heading */
.section-head {
  font-size: 1rem;
  font-weight: 800;
  color: #0F172A;
  margin: 4px 0 12px;
  letter-spacing: -0.3px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-head .dot { width: 9px; height: 9px; border-radius: 50%; background: #2563EB; }

/* Per-product breakdown table */
.breakdown-card {
  background: #fff;
  border: 1px solid #E2E8F0;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  margin-top: 8px;
  overflow-x: auto;
}
.breakdown-title {
  font-size: 0.72rem;
  font-weight: 800;
  color: #64748B;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  margin-bottom: 14px;
}
.breakdown-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; min-width: 580px; }
.breakdown-table th {
  text-align: right;
  padding: 9px 12px;
  font-size: 0.62rem;
  font-weight: 700;
  color: #94A3B8;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  border-bottom: 2px solid #E2E8F0;
}
.breakdown-table th:first-child, .breakdown-table td:first-child { text-align: left; }
.breakdown-table td { padding: 11px 12px; text-align: right; border-bottom: 1px solid #F1F5F9; color: #0F172A; font-weight: 600; }
.breakdown-table tr:last-child td { border-bottom: none; }
.breakdown-table .prod-name { font-weight: 700; }
.breakdown-table .row-click { cursor: pointer; transition: background 0.12s; }
.breakdown-table .row-click:hover { background: #F8FAFF; }
.breakdown-table .row-click.active { background: #EFF6FF; }
.breakdown-table .total-row td { border-top: 2px solid #E2E8F0; font-weight: 800; background: #F8FAFF; }
.roas-good { color: #16a34a; }
.roas-ok   { color: #D97706; }
.roas-bad  { color: #dc2626; }

/* ── Restructured layout ── */
.toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
  background: #fff;
  border: 1px solid #E2E8F0;
  border-radius: 14px;
  padding: 12px 16px;
  margin-bottom: 16px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.04);
}
.toolbar .range-bar { margin-bottom: 0; }

/* Product selector as a segmented tab control */
.product-tabs {
  display: inline-flex;
  background: #F1F5F9;
  border-radius: 12px;
  padding: 4px;
  gap: 2px;
  flex-wrap: wrap;
  margin-bottom: 22px;
}
.tab {
  padding: 8px 18px;
  border-radius: 9px;
  border: none;
  background: transparent;
  font-size: 0.8rem;
  font-weight: 600;
  color: #64748B;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Inter', sans-serif;
}
.tab:hover { color: #1E40AF; }
.tab.active {
  background: #fff;
  color: #1D4ED8;
  box-shadow: 0 1px 6px rgba(15,23,42,0.10);
}

/* Metric group blocks */
.metric-group { margin-bottom: 22px; }
.group-label {
  font-size: 0.68rem;
  font-weight: 800;
  color: #94A3B8;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
  padding-left: 2px;
}
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
@media (max-width: 820px) { .grid-4 { grid-template-columns: 1fr 1fr; } }
@media (max-width: 680px) { .grid-3 { grid-template-columns: 1fr 1fr; } }
@media (max-width: 460px) { .grid-4, .grid-3 { grid-template-columns: 1fr; } }

/* Hero (primary) cards — bigger numbers */
.hero-card { padding: 22px 22px; }
.hero-card .kpi-value { font-size: 2.1rem; }

/* Mini (secondary) cards — compact */
.mini-card { padding: 16px 18px; }
.mini-card .kpi-value { font-size: 1.5rem; }
</style>
</head>
<body>

<div class="app-header">
  <div class="header-logo">MLC<span>Daily Summary</span></div>
  <div class="header-right">
    <span class="header-user" id="headerUser"></span>
    <a href="/home" class="back-link">← Home</a>
  </div>
</div>

<div class="page-title">Daily Summary</div>
<div class="page-sub">Sales, spend &amp; inquiries across all products and ad accounts</div>

<div class="toolbar">
  <div class="range-bar">
    <span class="range-pick-label">From</span>
    <input type="date" id="fromDate" class="date-input">
    <span class="range-pick-label">To</span>
    <input type="date" id="toDate" class="date-input">
    <button class="range-btn active" id="applyBtn">Apply</button>
  </div>
  <div class="range-label" id="rangeLabel" style="margin:0"></div>
</div>

<div id="contentSection">
  <div class="state-msg">Loading...</div>
</div>

<script>
function fmt(n) {
  return '₱' + Number(n).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtRoas(n) {
  return Number(n).toFixed(2);
}

function fmtPct(n) {
  return Number(n).toFixed(1) + '%';
}

// Business "today" — day rolls over at 5 AM PHT (PHT = UTC+8; +3h shift = UTC midnight at 5 AM PHT)
function bizToday()       { return new Date(Date.now() + 3 * 60 * 60 * 1000).toISOString().split('T')[0]; }
function bizTodayMinus(n) { const d = new Date(Date.now() + 3 * 60 * 60 * 1000); d.setUTCDate(d.getUTCDate() - n); return d.toISOString().split('T')[0]; }

function setRangeLabel(fromStr, toStr) {
  const f = ds => new Date(ds + 'T00:00:00').toLocaleDateString('en-PH', { month: 'short', day: 'numeric', year: 'numeric' });
  const range = fromStr === toStr ? f(toStr) : `${f(fromStr)} — ${f(toStr)}`;
  const now = new Date().toLocaleString('en-PH', {
    timeZone: 'Asia/Manila',
    month: 'short', day: 'numeric', year: 'numeric',
    hour: 'numeric', minute: '2-digit', hour12: true
  });
  document.getElementById('rangeLabel').innerHTML =
    `Showing data for: ${range} &nbsp;·&nbsp; Updated: ${now} (PHT)`;
}

const NUM = n => Number(n || 0).toLocaleString('en-PH');

// Products — labels must match server product tags (AD_ACCOUNTS / classifyNdapProduct)
const ALL_PRODUCTS = ['CLEAR SIGHT', 'CANPRO', 'FIXORA', 'HEARWELL'];
const PRODUCTS = [
  { key: 'ALL',         label: 'All Products', set: ALL_PRODUCTS },
  { key: 'CLEAR SIGHT', label: 'Clear Sight',  set: ['CLEAR SIGHT'] },
  { key: 'CANPRO',      label: 'CanPro',        set: ['CANPRO'] },
  { key: 'FIXORA',      label: 'Hearing Aid',   set: ['FIXORA'] },
  { key: 'HEARWELL',    label: 'HearWell',      set: ['HEARWELL'] },
];

let STATE = { data: null, inq: null };
let currentKey = 'ALL';

function roasClass(roas, spend) {
  if (!spend) return '';
  if (roas >= 3.0) return 'roas-good';
  if (roas >= 2.7) return 'roas-ok';
  return 'roas-bad';
}

// Aggregate metrics for a set of product labels
function metricsFor(set) {
  const data = STATE.data || {}, inq = STATE.inq || {};
  const inSet = p => set.includes((p || '').toUpperCase());
  let spend = 0, inquiries = 0;
  for (const c of (data.campaigns || [])) {
    if (!inSet(c.product)) continue;
    spend += c.totalSpend || 0;
    for (const d of Object.values(c.dates || {})) inquiries += d.messagesStarted || 0;
  }
  const psbd = data.productSalesByDate || {};
  let sales = 0, orders = 0;
  for (const p of set) {
    const series = psbd[p]; if (!series) continue;
    for (const date of (data.dates || [])) {
      const r = series[date]; if (r) { sales += r.sales || 0; orders += r.orders || 0; }
    }
  }
  let morning = 0, evening = 0;
  const bp = inq.byProduct || {};
  for (const p of set) { if (bp[p]) { morning += bp[p].morning || 0; evening += bp[p].evening || 0; } }
  return {
    spend, sales, orders, inquiries, morning, evening,
    roas: spend > 0 ? sales / spend : 0,
    aov:  orders > 0 ? sales / orders : 0,
    cvr:  inquiries > 0 ? orders / inquiries * 100 : 0,
    cpm:  inquiries > 0 ? spend / inquiries : 0,
  };
}

function renderKpis() {
  const cfg = PRODUCTS.find(p => p.key === currentKey) || PRODUCTS[0];
  const m = metricsFor(cfg.set);
  const totalInq = m.morning + m.evening;
  document.getElementById('kpiGroups').innerHTML = `
    <div class="metric-group">
      <div class="group-label">Revenue — ${cfg.label}</div>
      <div class="grid-4">
        <div class="kpi-card hero-card highlight">
          <div class="kpi-label">Total Sales</div>
          <div class="kpi-value">${fmt(m.sales)}</div>
          <div class="kpi-sub">Gross (Pancake)</div>
        </div>
        <div class="kpi-card hero-card highlight">
          <div class="kpi-label">Total Spend</div>
          <div class="kpi-value">${fmt(m.spend)}</div>
          <div class="kpi-sub">All accounts</div>
        </div>
        <div class="kpi-card hero-card highlight">
          <div class="kpi-label">ROAS</div>
          <div class="kpi-value ${roasClass(m.roas, m.spend)}">${m.spend > 0 ? fmtRoas(m.roas) : '—'}</div>
          <div class="kpi-sub">Revenue / peso spent</div>
        </div>
        <div class="kpi-card hero-card highlight">
          <div class="kpi-label">Total Orders</div>
          <div class="kpi-value">${NUM(m.orders)}</div>
          <div class="kpi-sub">POS orders (Pancake)</div>
        </div>
      </div>
    </div>

    <div class="metric-group">
      <div class="group-label">Efficiency</div>
      <div class="grid-3">
        <div class="kpi-card mini-card">
          <div class="kpi-label">Avg AOV</div>
          <div class="kpi-value">${m.orders > 0 ? fmt(m.aov) : '—'}</div>
          <div class="kpi-sub">Average order value</div>
        </div>
        <div class="kpi-card mini-card">
          <div class="kpi-label">CVR</div>
          <div class="kpi-value">${m.inquiries > 0 ? fmtPct(m.cvr) : '—'}</div>
          <div class="kpi-sub">Inquiries to orders</div>
        </div>
        <div class="kpi-card mini-card">
          <div class="kpi-label">Avg CPM</div>
          <div class="kpi-value">${m.inquiries > 0 ? fmt(m.cpm) : '—'}</div>
          <div class="kpi-sub">Spend / inquiry</div>
        </div>
      </div>
    </div>

    <div class="metric-group">
      <div class="group-label">Inquiries (PHT)</div>
      <div class="grid-3">
        <div class="kpi-card mini-card">
          <div class="kpi-label">6AM – 3PM</div>
          <div class="kpi-value">${NUM(m.morning)}</div>
          <div class="kpi-sub">Morning shift</div>
        </div>
        <div class="kpi-card mini-card">
          <div class="kpi-label">3PM – 12AM</div>
          <div class="kpi-value">${NUM(m.evening)}</div>
          <div class="kpi-sub">Afternoon–evening shift</div>
        </div>
        <div class="kpi-card mini-card">
          <div class="kpi-label">Total Inquiries</div>
          <div class="kpi-value">${NUM(totalInq)}</div>
          <div class="kpi-sub">6AM–12AM combined</div>
        </div>
      </div>
    </div>`;
  // sync tab highlight
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.dataset.key === currentKey));
  // Compare table only shows for "All Products"
  const bc = document.getElementById('breakdownCard');
  if (bc) bc.style.display = currentKey === 'ALL' ? '' : 'none';
}

function renderTabs() {
  document.getElementById('productTabs').innerHTML = PRODUCTS.map(p =>
    `<button class="tab ${p.key === currentKey ? 'active' : ''}" data-key="${p.key}" onclick="selectProduct('${p.key}')">${p.label}</button>`
  ).join('');
}

function renderBreakdown() {
  let rows = '';
  for (const p of PRODUCTS.filter(p => p.key !== 'ALL')) {
    const m = metricsFor(p.set);
    rows += `<tr class="row-click ${p.key === currentKey ? 'active' : ''}" data-key="${p.key}" onclick="selectProduct('${p.key}')">
      <td class="prod-name">${p.label}</td>
      <td>${fmt(m.spend)}</td>
      <td>${fmt(m.sales)}</td>
      <td>${NUM(m.orders)}</td>
      <td class="${roasClass(m.roas, m.spend)}">${m.spend > 0 ? fmtRoas(m.roas) : '—'}</td>
      <td>${NUM(m.inquiries)}</td>
      <td>${m.inquiries > 0 ? fmtPct(m.cvr) : '—'}</td>
    </tr>`;
  }
  const t = metricsFor(ALL_PRODUCTS);
  rows += `<tr class="total-row">
    <td>All Products</td>
    <td>${fmt(t.spend)}</td>
    <td>${fmt(t.sales)}</td>
    <td>${NUM(t.orders)}</td>
    <td class="${roasClass(t.roas, t.spend)}">${t.spend > 0 ? fmtRoas(t.roas) : '—'}</td>
    <td>${NUM(t.inquiries)}</td>
    <td>${t.inquiries > 0 ? fmtPct(t.cvr) : '—'}</td>
  </tr>`;
  document.getElementById('breakdownBody').innerHTML = rows;
}

function selectProduct(key) {
  currentKey = key;
  renderKpis();
}

function renderAll() {
  document.getElementById('contentSection').innerHTML = `
    <div class="product-tabs" id="productTabs"></div>
    <div id="kpiGroups"></div>
    <div class="breakdown-card" id="breakdownCard">
      <div class="breakdown-title">Compare All Products</div>
      <table class="breakdown-table">
        <thead><tr>
          <th>Product</th><th>Spend</th><th>Sales</th><th>Orders</th><th>ROAS</th><th>Inquiries</th><th>CVR</th>
        </tr></thead>
        <tbody id="breakdownBody"></tbody>
      </table>
    </div>`;
  renderTabs();
  renderBreakdown();
  renderKpis();
}

async function load() {
  const fromDate = document.getElementById('fromDate').value;
  const toDate   = document.getElementById('toDate').value;
  if (!fromDate || !toDate) return;
  if (fromDate > toDate) { document.getElementById('toDate').value = fromDate; return; }

  document.getElementById('contentSection').innerHTML = '<div class="state-msg">Loading...</div>';
  setRangeLabel(fromDate, toDate);
  try {
    const [res, inqRes] = await Promise.all([
      fetch(`/api/ndap?from=${fromDate}&to=${toDate}`),
      fetch(`/api/inquiries-hourly?from=${fromDate}&to=${toDate}`)
    ]);
    if (!res.ok) throw new Error('Server error');
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    STATE.data = data;
    STATE.inq  = inqRes.ok ? await inqRes.json() : { byProduct: {} };
    renderAll();
  } catch(e) {
    document.getElementById('contentSection').innerHTML = `<div class="state-msg error-msg">Failed to load data: ${e.message}</div>`;
  }
}

// Date picker — default to today (5 AM PHT rollover), auto-reload on change
document.getElementById('toDate').value   = bizToday();
document.getElementById('fromDate').value = bizToday();
document.getElementById('applyBtn').addEventListener('click', load);
document.getElementById('fromDate').addEventListener('change', load);
document.getElementById('toDate').addEventListener('change', load);

// User display
fetch('/api/me').then(r => r.json()).then(u => {
  document.getElementById('headerUser').textContent = u.name || u.email || '';
}).catch(() => {});

// Initial load
load();
</script>
</body>
</html>
