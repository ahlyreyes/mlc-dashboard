<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad Spend — MLC Insights</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #EEF2FF;
  min-height: 100vh;
  padding: 24px 20px;
}

.app-header {
  background: linear-gradient(90deg, #1D4ED8 0%, #2563EB 60%, #3B82F6 100%);
  color: #fff;
  padding: 0 22px;
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-radius: 16px;
  margin-bottom: 22px;
  box-shadow: 0 4px 20px rgba(37,99,235,0.25);
}
.header-logo { font-size: 1.05rem; font-weight: 800; letter-spacing: -0.5px; }
.header-logo span { opacity: 0.65; font-weight: 500; font-size: 0.8rem; margin-left: 8px; letter-spacing: 0; }
.header-right { display: flex; align-items: center; gap: 12px; }
.header-user { font-size: 0.75rem; opacity: 0.8; font-weight: 500; }
.back-link {
  font-size: 0.75rem;
  font-weight: 600;
  color: #fff;
  text-decoration: none;
  opacity: 0.85;
  padding: 5px 12px;
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 8px;
  transition: all 0.15s;
}
.back-link:hover { opacity: 1; background: rgba(255,255,255,0.15); }

.page-title {
  font-size: 1.3rem;
  font-weight: 800;
  color: #0F172A;
  margin-bottom: 4px;
  letter-spacing: -0.5px;
}
.page-sub {
  font-size: 0.78rem;
  color: #64748B;
  margin-bottom: 20px;
  font-weight: 400;
}

/* Time range selector */
.range-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.range-btn {
  padding: 7px 18px;
  border-radius: 20px;
  border: 1.5px solid #DBEAFE;
  background: #fff;
  font-size: 0.78rem;
  font-weight: 600;
  color: #3B82F6;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.range-btn:hover { border-color: #2563EB; color: #1E40AF; background: #EFF6FF; }
.range-btn.active {
  background: linear-gradient(135deg, #2563EB, #3B82F6);
  border-color: #2563EB;
  color: #fff;
  box-shadow: 0 3px 12px rgba(37,99,235,0.30);
}
.range-bar { align-items: center; }
.range-pick-label {
  font-size: 0.72rem;
  font-weight: 700;
  color: #64748B;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.date-input {
  padding: 7px 12px;
  border-radius: 10px;
  border: 1.5px solid #DBEAFE;
  background: #fff;
  font-size: 0.78rem;
  font-weight: 600;
  color: #1E40AF;
  font-family: 'Inter', sans-serif;
  outline: none;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.date-input:focus { border-color: #2563EB; }

/* KPI grid */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 24px;
}
@media (max-width: 680px) { .kpi-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 420px) { .kpi-grid { grid-template-columns: 1fr; } }

.kpi-card {
  background: #fff;
  border: 1px solid #E2E8F0;
  border-radius: 16px;
  padding: 20px 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  transition: box-shadow 0.2s, transform 0.2s;
}
.kpi-card:hover { box-shadow: 0 6px 24px rgba(37,99,235,0.10); transform: translateY(-2px); }
.kpi-label {
  font-size: 0.65rem;
  font-weight: 700;
  color: #94A3B8;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.kpi-value {
  font-size: 1.85rem;
  font-weight: 800;
  color: #0F172A;
  line-height: 1.1;
  margin-bottom: 5px;
  letter-spacing: -0.5px;
}
.kpi-sub {
  font-size: 0.7rem;
  color: #94A3B8;
  font-weight: 400;
}
.kpi-card.highlight {
  border-left: 4px solid #2563EB;
  background: linear-gradient(135deg, #ffffff 0%, #F0F7FF 100%);
}

/* Loading / error */
.state-msg {
  text-align: center;
  padding: 48px;
  color: #94A3B8;
  font-size: 0.85rem;
}
.error-msg { color: #EF4444; }

/* Date range label */
.range-label {
  font-size: 0.72rem;
  font-weight: 500;
  color: #94A3B8;
  margin-bottom: 12px;
}
</style>
</head>
<body>

<div class="app-header">
  <div class="header-logo">MLC<span>Ad Spend</span></div>
  <div class="header-right">
    <span class="header-user" id="headerUser"></span>
    <a href="/home" class="back-link">← Home</a>
  </div>
</div>

<div class="page-title">Ad Spend Summary</div>
<div class="page-sub">Overall performance across all active ad accounts</div>

<div class="range-bar">
  <span class="range-pick-label">From</span>
  <input type="date" id="fromDate" class="date-input">
  <span class="range-pick-label">To</span>
  <input type="date" id="toDate" class="date-input">
  <button class="range-btn active" id="applyBtn">Apply</button>
</div>

<div class="range-label" id="rangeLabel"></div>

<div id="kpiSection">
  <div class="state-msg">Loading...</div>
</div>

<script>
function fmt(n) {
  return '₱' + Number(n).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtRoas(n) {
  return Number(n).toFixed(2);
}

function fmtPct(n) {
  return Number(n).toFixed(1) + '%';
}

// Business "today" — day rolls over at 5 AM PHT (PHT = UTC+8; +3h shift = UTC midnight at 5 AM PHT)
function bizToday()       { return new Date(Date.now() + 3 * 60 * 60 * 1000).toISOString().split('T')[0]; }
function bizTodayMinus(n) { const d = new Date(Date.now() + 3 * 60 * 60 * 1000); d.setUTCDate(d.getUTCDate() - n); return d.toISOString().split('T')[0]; }

function setRangeLabel(fromStr, toStr) {
  const f = ds => new Date(ds + 'T00:00:00').toLocaleDateString('en-PH', { month: 'short', day: 'numeric', year: 'numeric' });
  const range = fromStr === toStr ? f(toStr) : `${f(fromStr)} — ${f(toStr)}`;
  const now = new Date().toLocaleString('en-PH', {
    timeZone: 'Asia/Manila',
    month: 'short', day: 'numeric', year: 'numeric',
    hour: 'numeric', minute: '2-digit', hour12: true
  });
  document.getElementById('rangeLabel').innerHTML =
    `Showing data for: ${range} &nbsp;·&nbsp; Updated: ${now} (PHT)`;
}

async function load() {
  const fromDate = document.getElementById('fromDate').value;
  const toDate   = document.getElementById('toDate').value;
  if (!fromDate || !toDate) return;
  if (fromDate > toDate) { document.getElementById('toDate').value = fromDate; return; }

  document.getElementById('kpiSection').innerHTML = '<div class="state-msg">Loading...</div>';
  setRangeLabel(fromDate, toDate);
  const days   = Math.max(1, Math.round((new Date(toDate) - new Date(fromDate)) / 86400000) + 1);
  const dayLbl = days === 1 ? 'for 1 day' : `for ${days} days`;
  try {
    const res = await fetch(`/api/ndap?from=${fromDate}&to=${toDate}`);
    if (!res.ok) throw new Error('Server error');
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    const campaigns = data.campaigns || [];
    const allSalesByDate = data.allSalesByDate || {};

    let totalSpend = 0, totalMessages = 0;
    for (const c of campaigns) {
      totalSpend += c.totalSpend || 0;
      for (const d of Object.values(c.dates || {})) {
        totalMessages += d.messagesStarted || 0;
      }
    }

    // Use all-product sales (Clear Sight + Haplunas + others) for the selected date range
    let totalSales = 0, totalOrders = 0;
    for (const date of (data.dates || [])) {
      const dateData = allSalesByDate[date];
      if (!dateData) continue;
      totalSales  += dateData.sales  || 0;
      totalOrders += dateData.orders || 0;
    }

    const avgRoas = totalSpend > 0 ? totalSales / totalSpend : 0;
    const avgAov  = totalOrders > 0 ? totalSales / totalOrders : 0;
    const cvr     = totalMessages > 0 ? (totalOrders / totalMessages) * 100 : 0;
    const avgCpm  = totalMessages > 0 ? totalSpend / totalMessages : 0;

    document.getElementById('kpiSection').innerHTML = `
      <div class="kpi-grid">
        <div class="kpi-card highlight">
          <div class="kpi-label">Avg ROAS</div>
          <div class="kpi-value">${fmtRoas(avgRoas)}</div>
          <div class="kpi-sub">Revenue / peso spent</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Avg AOV</div>
          <div class="kpi-value">${fmt(avgAov)}</div>
          <div class="kpi-sub">Average order value</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">CVR</div>
          <div class="kpi-value">${fmtPct(cvr)}</div>
          <div class="kpi-sub">Inquiries to orders</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Avg CPM</div>
          <div class="kpi-value">${fmt(avgCpm)}</div>
          <div class="kpi-sub">Spend / inquiry</div>
        </div>
        <div class="kpi-card highlight">
          <div class="kpi-label">Total Spend</div>
          <div class="kpi-value">${fmt(totalSpend)}</div>
          <div class="kpi-sub">${dayLbl}</div>
        </div>
        <div class="kpi-card highlight">
          <div class="kpi-label">Total Sales</div>
          <div class="kpi-value">${fmt(totalSales)}</div>
          <div class="kpi-sub">${dayLbl}</div>
        </div>
      </div>
    `;
  } catch(e) {
    document.getElementById('kpiSection').innerHTML = `<div class="state-msg error-msg">Failed to load data: ${e.message}</div>`;
  }
}

// Date picker — default to today (5 AM PHT rollover), auto-reload on change
document.getElementById('toDate').value   = bizToday();
document.getElementById('fromDate').value = bizToday();
document.getElementById('applyBtn').addEventListener('click', load);
document.getElementById('fromDate').addEventListener('change', load);
document.getElementById('toDate').addEventListener('change', load);

// User display
fetch('/api/me').then(r => r.json()).then(u => {
  document.getElementById('headerUser').textContent = u.name || u.email || '';
}).catch(() => {});

// Initial load
load();
</script>
</body>
</html>
